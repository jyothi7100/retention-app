_schema-version: 3.3.0
ID: retention-app
description: A simple CAP project.
version: 1.0.0
modules:
- name: retention-app-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: retention-app-db
  - name: uaa_retention-app
  - name: retention-app-destination-service
  - name: retention-app-malware-scanner

  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: retention-app-db-deployer
  type: hdb
  path: db
  requires:
  - name: retention-app-db
  parameters:
    buildpack: nodejs_buildpack
- name: retention-app-destination-content
  type: com.sap.application.content
  requires:
  - name: retention-app-destination-service
    parameters:
      content-target: true
  - name: retention-app_html_repo_host
    parameters:
      service-key:
        name: retention-app_html_repo_host-key
  - name: uaa_retention-app
    parameters:
      service-key:
        name: uaa_retention-app-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ManagedAppRouter_retention_app_html_repo_host
          ServiceInstanceName: retention-app-html5-app-host-service
          ServiceKeyName: retention-app_html_repo_host-key
          sap.cloud.service: ManagedAppRouter
        - Authentication: OAuth2UserTokenExchange
          Name: ManagedAppRouter_uaa_retention_app
          ServiceInstanceName: retention-app-xsuaa-service
          ServiceKeyName: uaa_retention-app-key
          sap.cloud.service: ManagedAppRouter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: retention-app-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: retention-app_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - application.zip
      name: application
      target-path: resources/
- name: application
  type: html5
  path: app/application
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: retention-app-approuter
  type: approuter.nodejs
  path: approuter
  parameters:
    disk-quota: 256M
    memory: 256M
  requires:
  - name: retention-app-destination-service
  - name: retention-app-html5-runtime
  - name: uaa_retention-app

resources:
- name: retention-app-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared

- name: retention-app-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: retention-app-destination-service
    service-plan: lite
  requires:
  - name: srv-api

- name: retention-app_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: retention-app-html5-app-host-service
    service-plan: app-host

- name: retention-app-html5-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: retention-app-html5-runtime-service
    service-plan: app-runtime

- name: uaa_retention-app
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: retention-app-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-name: retention-app-xsuaa-service
    service-plan: application

# Reuses the existing malware scanner instance already provisioned
# in the subaccount - no new instance created on deploy.
- name: retention-app-malware-scanner
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: ARIBA-T_Malware Scanning Service

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production